name: CI/CD with Docker

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Docker login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set Docker tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/amp-server:${{ steps.tag.outputs.tag }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/amp-server:${{ steps.tag.outputs.tag }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: EC2에 무중단 배포 진행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -euo pipefail

            IMAGE=${{ secrets.DOCKER_USERNAME }}/amp-server:latest
            UPSTREAM_CONF=/etc/nginx/conf.d/app-upstream.conf

            echo "🔎 현재 실행 중인 컨테이너 확인"
            docker ps --format "table {{.Names}}\t{{.Ports}}\t{{.Status}}" || true

            # 현재 nginx upstream이 바라보는 포트 읽기(정확)
            CURRENT_PORT=$(grep -oE "server 127\.0\.0\.1:[0-9]{2,5};" "$UPSTREAM_CONF" | grep -oE "[0-9]{2,5}" | head -n 1)
            if [ -z "${CURRENT_PORT:-}" ]; then
              echo "❌ 현재 upstream 포트를 읽지 못함: $UPSTREAM_CONF"
              sudo cat "$UPSTREAM_CONF"
              exit 1
            fi

            if [ "$CURRENT_PORT" = "8080" ]; then
              NEW_PORT=8081
            else
              NEW_PORT=8080
            fi

            NEW_NAME=amp-server-$(if [ "$NEW_PORT" = "8080" ]; then echo "blue"; else echo "green"; fi)
            OLD_NAME=amp-server-$(if [ "$CURRENT_PORT" = "8080" ]; then echo "blue"; else echo "green"; fi)

            echo "✅ CURRENT_PORT=$CURRENT_PORT / NEW_PORT=$NEW_PORT"
            echo "✅ OLD_NAME=$OLD_NAME / NEW_NAME=$NEW_NAME"

            echo "📦 Docker image pull"
            for i in 1 2 3; do
              docker pull $IMAGE && break
              echo "⚠️ pull 실패 ($i/3), 3초 후 재시도..."
              sleep 3
            done

            if ! docker image inspect $IMAGE > /dev/null 2>&1; then
              echo "❌ image pull 최종 실패 → 기존 유지"
              exit 1
            fi

            echo "🚀 새 컨테이너 실행: $NEW_NAME"
            docker stop "$NEW_NAME" || true
            docker rm "$NEW_NAME" || true

            docker run -d \
              --name "$NEW_NAME" \
              -p "$NEW_PORT":8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SERVER_FORWARD_HEADERS_STRATEGY=framework \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e FIRE_BASE_CONFIG_64=${{ secrets.FIRE_BASE_CONFIG_64 }} \
              -e FCM_PROJECT_ID=${{ secrets.FCM_PROJECT_ID }} \
              -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              -e S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} \
              -e S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }} \
              -e S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }} \
              -e S3_REGION=${{ secrets.S3_REGION }} \
              -e REDIS_HOST=172.17.0.1 \
              "$IMAGE"

            echo "❤️ 헬스체크 (컨테이너 직접)"
            PASSED=0
            for i in $(seq 1 40); do
              STATUS=$(curl -s http://localhost:$NEW_PORT/actuator/health || true)
              echo "[$i] health: $STATUS"
              echo "$STATUS" | grep -q '"status":"UP"' && PASSED=1 && break || true
              sleep 3
            done

            if [ "$PASSED" -ne 1 ]; then
              echo "❌ 헬스체크 실패 → 롤백"
              docker logs "$NEW_NAME" | tail -n 200
              docker stop "$NEW_NAME" || true
              docker rm "$NEW_NAME" || true
              exit 1
            fi
            echo "✅ 헬스체크 통과"

            echo "🔄 Nginx upstream 포트 전환"
            sudo sed -i "s/server 127\.0\.0\.1:[0-9]\{2,5\};/server 127.0.0.1:$NEW_PORT;/" "$UPSTREAM_CONF"
            sudo nginx -t
            sudo systemctl reload nginx

            echo "🔎 (외부 도메인 기준) OAuth redirect_uri 확인"
            sleep 3  # nginx reload 이후 연결 안정화 대기

            # HEAD 대신 GET 요청으로 redirect_url 캡처 (curl 내장 변수 사용, 더 안정적)
            REDIRECT_URL=$(curl -sk -o /dev/null -w '%{redirect_url}' \
              https://api.ampnotice.kr/oauth2/authorization/google 2>/dev/null || true)
            echo "Captured redirect URL: ${REDIRECT_URL:0:300}..."

            if echo "$REDIRECT_URL" | grep -q "redirect_uri=https%3A%2F%2F"; then
              echo "✅ redirect_uri https 확인"
            else
              echo "❌ redirect_uri https 확인 실패 → nginx 롤백 + 새 컨테이너 제거"
              echo "  ↳ 실제 redirect URL: $REDIRECT_URL"
              sudo sed -i "s/server 127\.0\.0\.1:[0-9]\{2,5\};/server 127.0.0.1:$CURRENT_PORT;/" "$UPSTREAM_CONF"
              sudo nginx -t
              sudo systemctl reload nginx
              docker stop "$NEW_NAME" || true
              docker rm "$NEW_NAME" || true
              exit 1
            fi

            echo "🛑 이전 컨테이너 종료: $OLD_NAME"
            docker stop "$OLD_NAME" || true
            docker rm "$OLD_NAME" || true

            echo "🎉 배포 완료"