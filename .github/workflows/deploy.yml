name: CI/CD with Docker

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 레포 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 21 세팅
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Gradle 빌드
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 도커 로그인
      - name: Docker login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 브랜치별 태그 설정
      - name: Set Docker tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
          fi

      # 도커 이미지 빌드
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/amp-server:${{ steps.tag.outputs.tag }} .

      # 도커 이미지 푸시
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/amp-server:${{ steps.tag.outputs.tag }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      # Ec2에 배포
      - name: EC2에 무중단 배포 진행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -euo pipefail
            
            IMAGE=${{ secrets.DOCKER_USERNAME }}/amp-server:latest

            # 현재 운영 컨테이너 확인
            if docker ps --format '{{.Names}} {{.Ports}}' | grep -q 'amp-server-blue.*0.0.0.0:8080->8080'; then
              CURRENT_PORT=8080
            else
              CURRENT_PORT=8081
            fi

            if [ "$CURRENT_PORT" = "8080" ]; then
              NEW_PORT=8081
            else
              NEW_PORT=8080
            fi

            NEW_NAME=amp-server-$(if [ "$NEW_PORT" = "8080" ]; then echo "blue"; else echo "green"; fi)
            OLD_NAME=amp-server-$(if [ "$CURRENT_PORT" = "8080" ]; then echo "blue"; else echo "green"; fi)

            echo "📦 Docker image pull 시도"
            for i in 1 2 3; do
              docker pull $IMAGE && break
              echo "⚠️ docker pull 실패 ($i/3), 3초 후 재시도..."
              sleep 3
            done

            if ! docker image inspect $IMAGE > /dev/null 2>&1; then
              echo "❌ Docker image pull 최종 실패 → 기존 컨테이너 유지"
              exit 1
            fi

            echo "🚀 새 컨테이너 실행: $NEW_NAME (포트: $NEW_PORT)"
            docker stop $NEW_NAME || true
            docker rm $NEW_NAME || true
            docker run -d \
              --name $NEW_NAME \
              -p $NEW_PORT:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e FIRE_BASE_CONFIG_64=${{ secrets.FIRE_BASE_CONFIG_64 }} \
              -e FCM_PROJECT_ID=${{ secrets.FCM_PROJECT_ID }} \
              -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              -e S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} \
              -e S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }} \
              -e S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }} \
              -e S3_REGION=${{ secrets.S3_REGION }} \
              -e TZ=Asia/Seoul \
              -e REDIS_HOST=172.17.0.1 \
              $IMAGE

            echo "❤️ 헬스체크 진행 중"
            for i in $(seq 1 40); do
              STATUS=$(curl -s http://localhost:$NEW_PORT/actuator/health || true)
              echo "[$i] health: $STATUS"
              echo "$STATUS" | grep -q '"status":"UP"' && PASSED=1 && break || true
              sleep 3
            done

            if [ "${PASSED:-0}" -ne 1 ]; then
              echo "❌ 헬스체크 실패 → 새 컨테이너 로그 확인"
              docker logs "$NEW_NAME" | tail -n 200
              docker stop "$NEW_NAME" || true
              docker rm "$NEW_NAME" || true
              exit 1
            fi
            echo "✅ 헬스체크 통과"

            echo "🔄 Nginx 포트 전환"
            sudo sed -i "s/server 127\.0\.0\.1:[0-9][0-9]*/server 127.0.0.1:$NEW_PORT/" /etc/nginx/conf.d/app-upstream.conf
            sudo nginx -t
            sudo systemctl reload nginx

            echo "🛑 이전 컨테이너 종료: $OLD_NAME"
            docker stop $OLD_NAME || true
            docker rm $OLD_NAME || true